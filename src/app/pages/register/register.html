<div class="bg-slate-50">
  <div class="mx-auto max-w-md px-4 py-12 sm:px-6 sm:py-16">
    <div class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm sm:p-8">
      <h1 class="text-2xl font-bold text-slate-900">Create account</h1>
      <p class="mt-2 text-sm text-slate-600">Start organizing your important information.</p>

      <form class="mt-6 space-y-4" (submit)="$event.preventDefault()">
        <div>
          <label for="full-name" class="block text-sm font-medium text-slate-700">Full name</label>
          <input
            id="full-name"
            type="text"
            autocomplete="name"
            placeholder="Your full name"
            class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder:text-slate-400 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20"
          />
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-slate-700">Email</label>
          <input
            id="email"
            type="email"
            autocomplete="email"
            placeholder="you@example.com"
            class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder:text-slate-400 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
          <input
            id="password"
            type="password"
            autocomplete="new-password"
            placeholder="Create a password"
            class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder:text-slate-400 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20"
          />
        </div>

        <button
          type="submit"
          class="w-full rounded-lg bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
        >
          Create account
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-slate-600">
        Already have an account?
        <a routerLink="/login" class="font-medium text-blue-600 hover:text-blue-700">Log in</a>
      </p>
    </div>
  </div>
</div>
