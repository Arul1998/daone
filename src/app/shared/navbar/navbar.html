<nav class="border-b border-slate-200 bg-white">
  <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
    <div class="flex h-16 items-center justify-between">
      <a
        routerLink="/"
        class="text-lg font-semibold tracking-tight text-slate-900"
        (click)="closeMenu()"
      >
        DA<span class="text-blue-600">One</span>
      </a>

      <!-- Desktop links -->
      <div class="hidden items-center gap-1 sm:flex">
        @for (link of navLinks; track link.path) {
          <a
            [routerLink]="link.path"
            routerLinkActive="bg-slate-100 text-blue-600"
            [routerLinkActiveOptions]="{ exact: link.exact }"
            class="rounded-lg px-3 py-2 text-sm font-medium text-slate-600 transition hover:bg-slate-50 hover:text-slate-900"
          >
            {{ link.label }}
          </a>
        }
      </div>

      <!-- Mobile menu button -->
      <button
        type="button"
        class="inline-flex items-center justify-center rounded-lg p-2 text-slate-600 hover:bg-slate-100 hover:text-slate-900 sm:hidden"
        (click)="toggleMenu()"
        [attr.aria-expanded]="menuOpen()"
        aria-label="Toggle navigation menu"
      >
        @if (menuOpen()) {
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
          </svg>
        } @else {
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
          </svg>
        }
      </button>
    </div>
  </div>

  <!-- Mobile menu -->
  @if (menuOpen()) {
    <div class="border-t border-slate-200 px-4 pb-4 sm:hidden">
      @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="bg-slate-100 text-blue-600"
          [routerLinkActiveOptions]="{ exact: link.exact }"
          class="block rounded-lg px-3 py-2 text-sm font-medium text-slate-600 transition hover:bg-slate-50 hover:text-slate-900"
          (click)="closeMenu()"
        >
          {{ link.label }}
        </a>
      }
    </div>
  }
</nav>
