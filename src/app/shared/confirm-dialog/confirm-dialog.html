@if (open()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 px-4">
    <div
      #panel
      class="w-full max-w-md rounded-xl border border-slate-200 bg-white p-6 shadow-lg"
      role="dialog"
      aria-modal="true"
      [attr.aria-labelledby]="titleId()"
    >
      <h2 [id]="titleId()" class="text-lg font-semibold text-slate-900">{{ title() }}</h2>

      @if (message()) {
        <p class="mt-2 text-sm text-slate-600">{{ message() }}</p>
      }

      <div class="mt-6 flex flex-col gap-3 sm:flex-row sm:justify-end">
        <button
          type="button"
          (click)="onCancel()"
          [disabled]="processing()"
          class="inline-flex items-center justify-center rounded-lg border border-slate-300 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 transition hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-60"
        >
          {{ cancelLabel() }}
        </button>

        <button
          type="button"
          (click)="onConfirm()"
          [disabled]="processing()"
          [class]="confirmButtonClass()"
        >
          {{ confirmLabel() }}
        </button>
      </div>
    </div>
  </div>
}
